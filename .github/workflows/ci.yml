name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Triggered by the dashboard when a post is published
  repository_dispatch:
    types: [blog-rebuild]
  # Manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  check:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        # CI não tem acesso ao dashboard interno do VPS — usa o localhost (padrão),
        # que falhará silenciosamente e produzirá um build válido com dados vazios.
        # O build real com dados reais acontece no VPS via Docker (deploy job).
        run: npm run build

      - name: Unit tests
        run: npm test

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: check
    # Skip on content-triggered rebuilds to speed up deploy
    if: github.event_name != 'repository_dispatch' && github.event_name != 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run lighthouse

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: lhci-report
          if-no-files-found: warn

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [check, lighthouse]
    if: |
      needs.check.result == 'success' &&
      (needs.lighthouse.result == 'success' || needs.lighthouse.result == 'skipped') &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        github.event_name == 'repository_dispatch' ||
        github.event_name == 'workflow_dispatch'
      )

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: bash /opt/devs-a-deriva/scripts/deploy.sh
